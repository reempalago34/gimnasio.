{% extends 'form-base.html' %}
{% block titulo_pagina %}Editar Plan{% endblock %}
{% block content %}
<form method="POST">
    <div class="form-group mb-3">
        <label class="form-label">Nombre del Plan</label>
        <input type="text" name="nombrePlan" class="form-control" value="{{ plan.nombrePlan }}" required>
    </div>
    <div class="form-group mb-3">
        <label class="form-label">Precio</label>
        <input type="number" step="0.01" name="precio" class="form-control" value="{{ plan.precio }}" required>
    </div>
    <div class="form-group mb-4">
        <label class="form-label">Duración en Meses</label>
        <input type="number" name="duracionMeses" class="form-control" value="{{ plan.duracionMeses }}" required>
    </div>
    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-1"></i> Actualizar Plan</button>
        <a href="{{ url_for('plan_routes.index') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
