<!DOCTYPE html>
<html lang="es" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Nation</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.png') }}" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
    <style>
      :root {
        --surface: #ffffff;
        --surface-soft: #f8f9fa;
        --primary: #0f3460;
        --primary-dark: #0a1f35;
        --muted: #6c757d;
        --text: #102a43;
        --border-light: rgba(15, 52, 96, 0.1);
        --border-dark: rgba(0, 0, 0, 0.15);
      }

      body {
        /* Misma imagen de pesas que las demás páginas internas */
        background-color: #0a1f35;
        background-image: url("{{ url_for('static', filename='img/bg_weights.png') }}");
        background-repeat: no-repeat;
        background-position: center center;
        background-attachment: fixed;
        background-size: cover;
        /* El color del texto por defecto es blanco para contrastar con el fondo oscuro */
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem 1rem;
        box-sizing: border-box;
      }

      /* Capa oscura sobre la imagen para mejorar la legibilidad del contenido */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(10, 31, 53, 0.55);
        z-index: 0;
        pointer-events: none;
      }

      /* El contenedor del formulario debe estar encima de la capa oscura */
      .form-container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 520px;
      }

      .card {
        /* Glassmorphism: fondo translúcido con desenfoque — igual que en base.html */
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 1.5rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      .card-header {
        background: linear-gradient(90deg, #0f3460 0%, #1a447a 100%);
        border-radius: 1.5rem 1.5rem 0 0 !important;
        padding: 2rem 1.5rem;
        border-bottom: 1px solid var(--border-light);
      }

      .card-header h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #ffffff;
      }

      .card-body {
        padding: 2rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-control {
        border-radius: 0.75rem;
        border: 1px solid var(--border-light);
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
        background: #f8f9fa;
        color: var(--text);
        transition: all 0.3s ease;
      }

      .form-control::placeholder {
        color: rgba(102, 119, 136, 0.6);
      }

      .form-control:focus {
        border-color: #0f3460;
        background: #ffffff;
        color: var(--text);
        box-shadow: 0 0 0 3px rgba(15, 52, 96, 0.1);
        outline: none;
      }

      .form-label {
        font-weight: 600;
        /* Blanco con ligera transparencia — legible sobre el fondo oscuro */
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 0.5rem;
      }

      .btn {
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .btn-primary {
        background: linear-gradient(135deg, #0f3460 0%, #1a447a 100%);
        color: #ffffff;
        border: 1px solid rgba(15, 52, 96, 0.3);
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #1a447a 0%, #0f3460 100%);
        box-shadow: 0 4px 12px rgba(15, 52, 96, 0.25);
        transform: translateY(-2px);
      }

      .btn-secondary {
        background: #f8f9fa;
        color: #0f3460;
        border: 1px solid var(--border-light);
      }

      .btn-secondary:hover {
        background: #e9ecef;
        border-color: rgba(15, 52, 96, 0.2);
      }

      .alert {
        border-radius: 1rem;
        border: 1px solid var(--border-light);
        background: rgba(13, 110, 253, 0.08);
      }

      .alert-danger {
        background: rgba(220, 53, 69, 0.08);
        border-color: rgba(220, 53, 69, 0.2);
      }

      .alert-success {
        background: rgba(25, 135, 84, 0.08);
        border-color: rgba(25, 135, 84, 0.2);
      }

      hr {
        border-color: var(--border-light);
        opacity: 1;
      }

      .text-muted {
        /* Blanco suave en lugar de gris oscuro — visible sobre fondo oscuro */
        color: rgba(255, 255, 255, 0.6) !important;
      }

      .text-center {
        text-align: center;
      }

      a {
        /* Links en color claro para que se vean sobre el fondo oscuro */
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
        transition: all 0.3s ease;
      }

      a:hover {
        color: #ffffff;
      }

      .invalid-feedback {
        display: block;
        color: #dc3545;
        font-size: 0.875rem;
        margin-top: 0.25rem;
      }

      .form-control.is-invalid {
        border-color: #dc3545;
      }

      /* Fix for input-group with custom border-radius */
      .input-group > .form-control {
        border-top-right-radius: 0 !important;
        border-bottom-right-radius: 0 !important;
      }
      .input-group > .btn {
        border-top-left-radius: 0 !important;
        border-bottom-left-radius: 0 !important;
        border-top-right-radius: 0.75rem !important;
        border-bottom-right-radius: 0.75rem !important;
        border-left: none !important;
        background: #f8f9fa;
        color: var(--text);
        border-color: var(--border-light);
      }
      .input-group > .btn:hover {
        background: #e9ecef;
        color: var(--primary);
      }
    </style>
</head>

<body>
  <div class="form-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show mb-4" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card">
      <div class="card-header">
        <h1 class="mb-0">{% block titulo_pagina %}{% endblock %}</h1>
      </div>
      <div class="card-body">
        {% block content %}
        {% endblock %}
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.js') }}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Flash messages auto-close
        setTimeout(function() {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                let bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 10000);

        // Password visibility toggle
        const toggleButtons = document.querySelectorAll('.toggle-password');
        toggleButtons.forEach(button => {
            button.addEventListener('click', function() {
                const inputId = this.getAttribute('data-target');
                const input = document.getElementById(inputId);
                const icon = this.querySelector('i');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('bi-eye');
                    icon.classList.add('bi-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('bi-eye-slash');
                    icon.classList.add('bi-eye');
                }
            });
        });
    });
  </script>
</body>
</html>
