{% extends 'form-base.html' %}
{% block titulo_pagina %}Agregar Cliente{% endblock %}
{% block content %}
<form method="POST">
    <div class="form-group mb-3">
        <label class="form-label">Nombre Completo</label>
        {% if current_user.rol == 'usuario' %}
            <input type="text" class="form-control bg-light" value="{{ current_user.nombre }}" readonly>
        {% else %}
            <input type="text" name="nombre" class="form-control" required placeholder="Ej. Carlos Torres">
        {% endif %}
    </div>
    <div class="form-group mb-3">
        <label class="form-label">Edad</label>
        <input type="number" name="edad" class="form-control" required placeholder="Ej. 25">
    </div>
    <div class="form-group mb-4">
        <label class="form-label">Teléfono</label>
        <input type="text" name="telefono" class="form-control" placeholder="Ej. 555-0100">
    </div>
    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i> Guardar Cliente</button>
        <a href="{{ url_for('cliente_routes.index') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
