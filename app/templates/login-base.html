<!DOCTYPE html>
<html lang="es" class="h-100">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fit Nation - Iniciar Sesión</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.png') }}" type="image/png">
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
  <style>
    :root {
      --surface: #ffffff;
      --surface-soft: #f8f9fa;
      --primary: #0f3460;
      --primary-dark: #0a1f35;
      --muted: #6c757d;
      --text: #102a43;
      --border-light: rgba(15, 52, 96, 0.1);
      --border-dark: rgba(0, 0, 0, 0.15);
    }


    body {
      background-color: #0a1f35;
      background-image: url("{{ url_for('static', filename='img/bg_luz.png') }}");
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      background-size: cover;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      box-sizing: border-box;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10, 31, 53, 0.55);
      z-index: 0;
      pointer-events: none;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card-header {
      background: rgba(15, 52, 96, 0.5);
      border-radius: 1.5rem 1.5rem 0 0 !important;
      padding: 2rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .card-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    .card-header p {
      font-size: 0.95rem;
      opacity: 0.9;
      margin-bottom: 0;
      color: rgba(255, 255, 255, 0.9);
    }

    .form-control {
      border-radius: 0.75rem;
      border: 1px solid var(--border-light);
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      background: #f8f9fa;
      color: var(--text);
      transition: all 0.3s ease;
    }

    .form-control::placeholder {
      color: rgba(102, 119, 136, 0.6);
    }

    .form-control:focus {
      border-color: #0f3460;
      background: #ffffff;
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(15, 52, 96, 0.1);
      outline: none;
    }

    .form-label {
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
    }

    .btn {
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      font-weight: 600;
      border: 1px solid var(--border-light);
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0f3460 0%, #1a447a 100%);
      color: #ffffff;
      border-color: rgba(15, 52, 96, 0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #1a447a 0%, #0f3460 100%);
    }

    .btn-secondary {
      background: #f8f9fa;
      color: #0f3460;
      border-color: var(--border-light);
    }

    .btn-secondary:hover {
      background: #e9ecef;
      border-color: rgba(15, 52, 96, 0.2);
    }

    .alert {
      border-radius: 1rem;
      border: 1px solid var(--border-light);
      background: rgba(13, 110, 253, 0.08);
    }

    hr {
      border-color: var(--border-light);
      opacity: 1;
    }

    .text-muted {
      color: rgba(255, 255, 255, 0.6) !important;
    }

    .footer-info {
      background: rgba(15, 52, 96, 0.6) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15) !important;
    }

    /* Fix for input-group with custom border-radius */
    .input-group > .form-control {
      border-top-right-radius: 0 !important;
      border-bottom-right-radius: 0 !important;
    }
    .input-group > .btn {
      border-top-left-radius: 0 !important;
      border-bottom-left-radius: 0 !important;
      border-top-right-radius: 0.75rem !important;
      border-bottom-right-radius: 0.75rem !important;
      border-left: none !important;
      background: #f8f9fa;
      color: var(--text);
      border-color: var(--border-light);
    }
    .input-group > .btn:hover {
      background: #e9ecef;
      color: var(--primary);
    }
  </style>
</head>

<body>
  <div class="login-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }} alert-dismissible fade show mb-4" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block content %}
    {% endblock %}

    <div class="mt-4 text-center text-white p-3 rounded footer-info">
      <p class="mb-1"><i class="bi bi-telephone"></i> Teléfono: 3125747889</p>
      <p class="mb-0"><i class="bi bi-geo-alt"></i> Dirección: carrera 6 5-34 Veléz Santander</p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.js') }}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Flash messages auto-close
        setTimeout(function() {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                let bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 10000);

        // Password visibility toggle
        const toggleButtons = document.querySelectorAll('.toggle-password');
        toggleButtons.forEach(button => {
            button.addEventListener('click', function() {
                const inputId = this.getAttribute('data-target');
                const input = document.getElementById(inputId);
                const icon = this.querySelector('i');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('bi-eye');
                    icon.classList.add('bi-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('bi-eye-slash');
                    icon.classList.add('bi-eye');
                }
            });
        });
    });
  </script>
</body>

</html>
