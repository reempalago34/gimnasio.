services:
  db:
    image: postgres:15-alpine
    container_name: flask_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "5439:5432" # Descomentar solo para mantenimiento local
    networks:
      - flask_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: 
      context: .
      args:
        PORT: ${PORT:-81}
    container_name: flask_app
    restart: always
    ports:
      - "${PORT:-81}:${PORT:-81}"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - PORT=${PORT:-81}
      - FLASK_ENV=production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flask_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-81}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  flask_network:
    driver: bridge

volumes:
  postgres_data:
