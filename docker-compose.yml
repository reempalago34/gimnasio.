services:
  db:
    image: postgres:15-alpine
    container_name: flask_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flask_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flask_password}
      POSTGRES_DB: ${POSTGRES_DB:-flask_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flask_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-flask_user} -d $${POSTGRES_DB:-flask_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: flask_app
    restart: always
    ports:
      - "81:81"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flask_network

networks:
  flask_network:
    driver: bridge

volumes:
  postgres_data:
